<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SİBER ZEKA | RETRO DAKTİLO</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --dark-green: #1a331a; 
            --paper-color: #f5f0e1; 
            --ink-black: #050505; 
            --neon-accent: #00ff00; 
        }

        body { 
            background-color: var(--dark-green);
            background-image: radial-gradient(rgba(0,0,0,0.15) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Courier Prime', monospace;
            margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; 
        }
        
        header { padding: 20px; text-align: center; color: var(--neon-accent); letter-spacing: 2px; }
        h1 { margin: 0; font-size: 1.4rem; text-transform: uppercase; text-shadow: 0 0 10px rgba(0,255,0,0.3); }

        #chat-container { 
            width: 80%; max-width: 800px; flex: 1; overflow-y: auto; padding: 25px; 
            background: var(--paper-color); border: 2px solid rgba(0,0,0,0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px;
        }

        .message { max-width: 85%; line-height: 1.6; font-size: 1.1rem; color: var(--ink-black); }
        .user-message { align-self: flex-end; font-weight: 700; text-align: right; }
        .ai-message { align-self: flex-start; font-weight: 400; }

        .input-area { width: 80%; max-width: 800px; padding-bottom: 30px; display: flex; gap: 15px; }
        input { 
            flex: 1; background: rgba(255,255,255,0.9); border: 2px solid #333; 
            color: #000; padding: 15px; font-family: inherit; font-size: 1.1rem; outline: none; 
        }
        button { 
            background: #333; color: #fff; border: 2px solid #333; padding: 0 30px; 
            font-weight: bold; cursor: pointer; font-family: inherit; text-transform: uppercase; 
        }
        button:hover { background: #555; }

        /* Yanıp sönen daktilo imleci */
        .cursor { display: inline-block; width: 10px; height: 1.1rem; background: var(--ink-black); margin-left: 2px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <h1>[ SİBER ZEKA DAKTİLO KONSOLU ]</h1>
    </header>

    <div id="chat-container">
        <div class="message ai-message">Sistem hazır... Kağıt takıldı. Yazmaya başlayabilirsiniz.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Buraya daktilo edin..." autocomplete="off">
        <button id="sendBtn">YAZ</button>
    </div>

    <audio id="typeSound" src="https://www.soundjay.com/communication/typewriter-key-1.mp3"></audio>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typeSound = document.getElementById('typeSound');

        async function typeWriterEffect(element, text) {
            let i = 0;
            element.textContent = "";
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            element.appendChild(cursor);

            while (i < text.length) {
                // Harfi imlecin önüne ekle
                cursor.before(text.charAt(i));
                
                // Sesi çal (Hızlı çalması için resetle)
                typeSound.currentTime = 0;
                typeSound.play().catch(() => {}); 
                
                i++;
                await new Promise(resolve => setTimeout(resolve, 50)); // Yazma hızı (50ms)
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
            cursor.remove(); // Yazma bitince imleci kaldır
        }

        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            // 1. Kullanıcı mesajını ekle
            addMessage(message, 'user-message');
            userInput.value = '';

            // 2. AI İÇİN YEPYENİ VE BOŞ BİR KUTU OLUŞTUR
            const aiDivId = addMessage('', 'ai-message'); // İçini boş bırakıyoruz
            const aiDiv = document.getElementById(aiDivId);

            try {
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: message })
                });
                const data = await response.json();
                
                // 3. CEVABI SADECE BU YENİ OLUŞTURULAN KUTUYA YAZDIR
                await typeWriterEffect(aiDiv, data.reply);
                
            } catch (error) {
                aiDiv.textContent = "HATA: Şerit koptu! (Sunucu bağlantısı yok)";
            }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            const id = 'msg-' + Date.now();
            div.id = id;
            div.className = `message ${className}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
